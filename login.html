<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description"
        content="Login to your Lumière Candle Co. account to access your order history, wishlist, and personalized settings.">
    <meta name="keywords" content="login, sign in, account, lumiere candle co">
    <link rel="icon" type="image/svg+xml" href="assets/favicon.svg">
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="css/styles.css">
    <title>Login - Lumière Candle Co.</title>
</head>

<body class="bg-gray-50 dark:bg-gray-900 h-screen overflow-hidden">

    <!-- Theme Toggle -->
    <button id="darkModeToggle"
        class="fixed top-4 right-4 bg-white dark:bg-gray-800 p-2 rounded-full shadow-lg z-50 hover:scale-110 transition-transform duration-300">
        <i class="fas fa-moon text-gray-700 dark:text-gray-300 text-sm"></i>
    </button>

    <!-- Login Container -->
    <div class="h-full flex items-center justify-center px-4">
        <div class="w-full max-w-md">
            <!-- Logo and Brand -->
            <div class="text-center mb-6">
                <a href="index.html" class="inline-flex justify-center items-center space-x-2 group mb-3">
                    <div
                        class="w-10 h-10 bg-gradient-to-br from-orange-400 to-amber-600 rounded-full flex items-center justify-center transform transition-transform duration-300 group-hover:scale-110">
                        <i class="fas fa-fire text-white text-lg"></i>
                    </div>
                    <span
                        class="text-xl font-bold text-gray-800 dark:text-white group-hover:text-orange-600 dark:group-hover:text-orange-400 transition-colors duration-300">Lumière
                        Candle Co.</span>
                </a>
                <h1 class="text-xl font-semibold text-gray-900 dark:text-white mb-1">Welcome Back</h1>
                <p class="text-sm text-gray-600 dark:text-gray-400">Sign in to your account</p>
            </div>

            <!-- Login Form -->
            <div class="bg-white dark:bg-gray-800 rounded-lg shadow-lg p-6">
                <form id="loginForm" class="space-y-4">
                    <!-- Email -->
                    <div>
                        <label for="email" class="block text-sm font-medium text-gray-700 dark:text-gray-300 mb-1">
                            Email Address
                        </label>
                        <div class="relative">
                            <input type="email" id="email" name="email" required
                                class="w-full px-3 py-2 pl-9 border border-gray-300 dark:border-gray-600 rounded-lg focus:ring-2 focus:ring-orange-500 focus:border-transparent dark:bg-gray-700 dark:text-white text-sm"
                                placeholder="you@example.com">
                            <i class="fas fa-envelope absolute left-3 top-2.5 text-gray-400 text-sm"></i>
                        </div>
                    </div>

                    <!-- Password -->
                    <div>
                        <label for="password" class="block text-sm font-medium text-gray-700 dark:text-gray-300 mb-1">
                            Password
                        </label>
                        <div class="relative">
                            <input type="password" id="password" name="password" required
                                class="w-full px-3 py-2 pl-9 pr-9 border border-gray-300 dark:border-gray-600 rounded-lg focus:ring-2 focus:ring-orange-500 focus:border-transparent dark:bg-gray-700 dark:text-white text-sm"
                                placeholder="••••••••">
                            <i class="fas fa-lock absolute left-3 top-2.5 text-gray-400 text-sm"></i>
                            <button type="button" id="togglePassword"
                                class="absolute right-3 top-2.5 text-gray-400 hover:text-gray-600">
                                <i class="fas fa-eye text-sm"></i>
                            </button>
                        </div>
                    </div>

                    <!-- Remember Me & Forgot Password -->
                    <div class="flex items-center justify-between">
                        <label class="flex items-center">
                            <input type="checkbox"
                                class="w-3 h-3 text-orange-600 border-gray-300 rounded focus:ring-orange-500">
                            <span class="ml-2 text-xs text-gray-600 dark:text-gray-400">Remember me</span>
                        </label>
                        <a href="#" class="text-xs text-orange-600 hover:text-orange-700 dark:text-orange-400">Forgot
                            password?</a>
                    </div>

                    <!-- Login Button -->
                    <button type="submit"
                        class="w-full bg-orange-600 hover:bg-orange-700 text-white font-semibold py-2 px-4 rounded-lg transition-colors duration-200 flex items-center justify-center text-sm">
                        <i class="fas fa-sign-in-alt mr-2"></i>
                        Sign In
                    </button>
                </form>

                <!-- Divider -->
                <div class="relative my-4">
                    <div class="absolute inset-0 flex items-center">
                        <div class="w-full border-t border-gray-300 dark:border-gray-600"></div>
                    </div>
                    <div class="relative flex justify-center text-xs">
                        <span class="px-2 bg-white dark:bg-gray-800 text-gray-500">Or continue with</span>
                    </div>
                </div>

                <!-- Social Login Buttons -->
                <div class="space-y-2">
                    <button
                        class="w-full flex items-center justify-center px-3 py-2 border border-gray-300 dark:border-gray-600 rounded-lg shadow-sm text-xs font-medium text-gray-700 dark:text-gray-300 bg-white dark:bg-gray-700 hover:bg-gray-50 dark:hover:bg-gray-600 transition-colors duration-200">
                        <i class="fab fa-google text-red-500 mr-2"></i>
                        Continue with Google
                    </button>

                    <button
                        class="w-full flex items-center justify-center px-3 py-2 border border-gray-300 dark:border-gray-600 rounded-lg shadow-sm text-xs font-medium text-gray-700 dark:text-gray-300 bg-white dark:bg-gray-700 hover:bg-gray-50 dark:hover:bg-gray-600 transition-colors duration-200">
                        <i class="fab fa-facebook text-blue-600 mr-2"></i>
                        Continue with Facebook
                    </button>

                    <button
                        class="w-full flex items-center justify-center px-3 py-2 border border-gray-300 dark:border-gray-600 rounded-lg shadow-sm text-xs font-medium text-gray-700 dark:text-gray-300 bg-white dark:bg-gray-700 hover:bg-gray-50 dark:hover:bg-gray-600 transition-colors duration-200">
                        <i class="fab fa-apple text-gray-800 dark:text-white mr-2"></i>
                        Continue with Apple
                    </button>
                </div>

                <!-- Sign Up Link -->
                <div class="mt-4 text-center">
                    <p class="text-xs text-gray-600 dark:text-gray-400">
                        Don't have an account?
                        <a href="signup.html"
                            class="font-medium text-orange-600 hover:text-orange-700 dark:text-orange-400">
                            Sign up
                        </a>
                    </p>
                </div>
            </div>
        </div>
    </div>

    <script src="js/main.js"></script>
    <script>
        // Toggle password visibility
        document.getElementById('togglePassword').addEventListener('click', function () {
            const passwordInput = document.getElementById('password');
            const icon = this.querySelector('i');

            if (passwordInput.type === 'password') {
                passwordInput.type = 'text';
                icon.classList.remove('fa-eye');
                icon.classList.add('fa-eye-slash');
            } else {
                passwordInput.type = 'password';
                icon.classList.remove('fa-eye-slash');
                icon.classList.add('fa-eye');
            }
        });

        // Handle login form submission
        document.getElementById('loginForm').addEventListener('submit', function (e) {
            e.preventDefault();

            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;

            // Simple validation (in real app, this would be server-side)
            if (email && password) {
                // Store login state
                localStorage.setItem('isLoggedIn', 'true');
                localStorage.setItem('userEmail', email);

                // Show success message
                showNotification('Login successful! Redirecting...');

                // Redirect to account page after delay
                setTimeout(() => {
                    window.location.href = 'account.html';
                }, 1500);
            }
        });

        // Social login handlers
        document.querySelectorAll('button').forEach(button => {
            if (button.textContent.includes('Continue with')) {
                button.addEventListener('click', function () {
                    const provider = this.textContent.trim();
                    showNotification(`${provider} login would be handled by OAuth provider`);
                });
            }
        });
    </script>
</body>

</html>
